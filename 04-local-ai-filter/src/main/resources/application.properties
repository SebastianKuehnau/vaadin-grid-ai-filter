vaadin.launch-browser=true
spring.application.name=04-local-ai-filter
server.port=8084

# In-memory H2 database for the demo (auto-configured from the H2 runtime dependency)
spring.datasource.url=jdbc:h2:mem:aigridfilter;DB_CLOSE_DELAY=-1

# Let Hibernate create the schema from the @Entity classes on startup
spring.jpa.hibernate.ddl-auto=create-drop

# Run data.sql AFTER Hibernate has created the schema (otherwise CUSTOMER does not exist yet)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.jpa.show-sql=true

logging.level.org.springframework.ai.chat.client.advisor=INFO

# AI Chat Model Bean Selection
# Specify which ChatModel bean to use in CustomerSearchService.
# Default: ollamaChatModel (for local Ollama models)
# Alternative: openAiChatModel (for OpenAI cloud models)
app.ai.chat-model-bean=ollamaChatModel

#---
# OpenAI (cloud) chat model — active under the "openai" profile (the default).
# Requires env var OPENAI_API_KEY (the literal fallback "SOMETHING" will not work).
spring.ai.openai.api-key=${OPENAI_API_KEY:SOMETHING}
spring.ai.openai.chat.model=gpt-5.4-mini

#---
# Local chat model via Ollama — active under the "ollama" profile.
# Prerequisites: Ollama is running and the model has been pulled:
#   ollama pull qwen3:8b
# Deterministic structured output (the service also sets temperature 0 in code).
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
#spring.ai.ollama.chat.model=qwen3.5:4b-mlx
spring.ai.ollama.chat.model=llama3.1:8b
#spring.ai.ollama.chat.model=qwen3:8b
#spring.ai.ollama.chat.model=gemma4:26b-mlx
spring.ai.ollama.chat.temperature=0
spring.ai.ollama.chat.think=false
spring.ai.ollama.chat.num-ctx=4096
spring.ai.ollama.init.pull-model-strategy=when_missing
