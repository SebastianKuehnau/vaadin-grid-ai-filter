# Shadows src/main/resources/application.properties for every test in this module (Maven puts
# test-classes ahead of classes on the test classpath) — duplicated deliberately so IT profile
# selection lives here as plain config instead of a custom @ActiveProfiles resolver. Keep the
# datasource/JPA lines in sync with the main file if those ever change.
spring.datasource.url=jdbc:h2:mem:aigridfilter;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Without this, both spring-ai-starter-model-openai and -ollama are on the classpath and their
# autoconfigurations both have matchIfMissing=true, so a missing property means both ChatModel
# beans get created (NoUniqueBeanDefinitionException) instead of just one.
spring.ai.model.chat=openai

# Selects which of the app's ollama(default)/mlx/cloud profiles the IT suites target; same
# AI_TEST_PROFILE env var or -D flag as before, see OllamaTestSupport.
spring.profiles.active=${AI_TEST_PROFILE:ollama}

# Also shadowed from the main file (see comment above): without it, both the ollama and openai
# spring-ai starters (both on the classpath) auto-configure a ChatModel bean, and context loading
# fails with "expected single matching bean but found 2: ollamaChatModel,openAiChatModel".
spring.ai.model.chat=openai
