vaadin.launch-browser=true
spring.application.name=03-ai-structured-filter
server.port=8083

# No profile given -> the real OpenAI API (see application-openai.properties).
spring.profiles.default=openai

# Default chat model provider: OpenAI-compatible (the openai profile talks to it directly; ollama
# profile overrides this to "ollama" for the native binding, see application-ollama.properties).
# Needed once both starters are on the classpath, or Spring Boot creates two ChatModel beans.
spring.ai.model.chat=openai

# In-memory H2 database for the demo (auto-configured from the H2 runtime dependency)
spring.datasource.url=jdbc:h2:mem:aigridfilter;DB_CLOSE_DELAY=-1

# Let Hibernate create the schema from the @Entity classes on startup
spring.jpa.hibernate.ddl-auto=create-drop

# Run data.sql AFTER Hibernate has created the schema (otherwise CUSTOMER does not exist yet)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.jpa.show-sql=true

logging.level.org.springframework.ai.chat.client.advisor=INFO
