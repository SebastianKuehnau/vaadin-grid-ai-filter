# Local model via mlx_lm.server's OpenAI-compatible endpoint (Apple Silicon only).
# Start it manually on the host first, e.g.:
#   mlx_lm.server --model mlx-community/Meta-Llama-3.1-8B-Instruct-4bit --port 8090
# Adjust chat.model below to whatever model you actually loaded into mlx_lm.server.
spring.ai.openai.base-url=${MLX_BASE_URL:http://localhost:8090}/v1
spring.ai.openai.api-key=not-needed
spring.ai.openai.chat.model=mlx-community/Meta-Llama-3.1-8B-Instruct-4bit
spring.ai.openai.chat.temperature=0
