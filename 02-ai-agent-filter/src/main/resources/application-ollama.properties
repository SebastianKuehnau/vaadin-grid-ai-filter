# Local model via Ollama's OpenAI-compatible endpoint (default backend).
# Prerequisites: Ollama is running and the model has been pulled:
#   ollama pull llama3.1:8b
spring.ai.openai.base-url=${OLLAMA_BASE_URL:http://localhost:11434}/v1
spring.ai.openai.api-key=not-needed
spring.ai.openai.chat.model=llama3.1:8b
spring.ai.openai.chat.temperature=0
# Best-effort passthrough for Ollama's context-window size; unverified whether Ollama's
# OpenAI-compat endpoint honors it (no first-class Spring AI OpenAI option for num_ctx).
spring.ai.openai.chat.extra-body.options.num_ctx=4096
