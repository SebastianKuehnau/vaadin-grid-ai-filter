# Native Ollama binding (default backend) — not the OpenAI-compatible endpoint, so "think"/"num_ctx"
# below are actually honored (Ollama's OpenAI-compatible endpoint silently ignores both).
# Prerequisites: Ollama is running and the model has been pulled:
#   ollama pull llama3.1:8b
spring.ai.model.chat=ollama
# spring-ai-starter-model-openai is still on the classpath (the openai profile uses it); its
# audio-speech autoconfiguration eagerly builds an OpenAI client at startup regardless of
# spring.ai.model.chat, and fails without any credential — this key is never actually used for chat.
spring.ai.openai.api-key=not-needed
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=qwen3:8b
spring.ai.ollama.chat.temperature=0
spring.ai.ollama.chat.num-ctx=4096
# llama3.1:8b never "thinks" anyway; this matters when swapping in a reasoning-capable model
# (e.g. qwen3:8b) — without it, such a model burns hundreds of tokens on a <think> block per call.
spring.ai.ollama.chat.think=false
# Keep the model resident between queries so sporadic live-demo interactions don't pay a cold
# model-reload penalty (Ollama unloads an idle model after 5 min by default). Purely a demo
# latency safeguard: it does not change the output and is not visible in the back-to-back eval,
# which keeps the model warm anyway.
spring.ai.ollama.chat.keep-alive=1h
