# OpenAI cloud API. Requires the OPENAI_API_KEY environment variable; the dummy fallback below
# only prevents a boot-time crash when it's unset, it will not make real API calls succeed.
spring.ai.openai.base-url=https://api.openai.com/v1
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-dummy-key-not-set}
spring.ai.openai.chat.model=gpt-5.4-mini
