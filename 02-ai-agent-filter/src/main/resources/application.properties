vaadin.launch-browser=true
spring.application.name=02-ai-agent-filter
server.port=8082

# No profile given -> behave exactly like the "ollama" profile (see application-ollama.properties).
spring.profiles.default=mlx

# Default chat model provider: OpenAI-compatible (mlx/cloud profiles talk to it directly; ollama
# profile overrides this to "ollama" for the native binding, see application-ollama.properties).
# Needed once both starters are on the classpath, or Spring Boot creates two ChatModel beans.
spring.ai.model.chat=openai

logging.level.org.springframework.ai.chat.client.advisor=INFO

spring.datasource.url=jdbc:h2:mem:aigridfilter;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
