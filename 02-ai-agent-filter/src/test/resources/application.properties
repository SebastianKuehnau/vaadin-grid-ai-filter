# Shadows src/main/resources/application.properties for every test in this module (Maven puts
# test-classes ahead of classes on the test classpath) — duplicated deliberately so IT profile
# selection lives here as plain config instead of a custom @ActiveProfiles resolver. Keep the
# datasource/JPA lines in sync with the main file if those ever change.
spring.datasource.url=jdbc:h2:mem:aigridfilter;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Selects which of the app's ollama/openai(default) profiles the IT suites target; same
# AI_TEST_PROFILE env var or -D flag as before.
spring.profiles.active=${AI_TEST_PROFILE:ollama}
